site_name: 🎾 Henry's Tennis Knowledge Vault
site_description: A bilingual (EN-VI) tennis coaching library for the 3.5 player at 50+ — 22 deep dives, a 14-Part master manual, a 2-page cheat sheet, and 20 years of accumulated biomechanics, taichi principles, and 50+ longevity adjustments.
site_author: Henry Pham Duc
site_url: https://henryphamduc.github.io/AI/
repo_url: https://github.com/HenryPhamDuc/AI
repo_name: HenryPhamDuc/AI
edit_uri: edit/master/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.tabs           # Top horizontal menu for main categories
    - navigation.sections       # Sidebar collapse for sub-chapters
    - navigation.indexes        # Section index pages
    # NOTE: navigation.expand is no-op in Material 9.x; use custom CSS instead (see extra_css below)
    - navigation.top            # Back to top button
    - navigation.tracking       # URL tracking for anchor links
    - search.suggest            # Smart search bar auto-suggestions
    - search.highlight          # Highlight matches in results
    - search.share              # Share search results via URL
    - content.code.copy         # Copy button on code blocks
    - content.tabs.link         # Sync tabs across instances
    - toc.follow                # Follow scroll position
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    logo: material/tennis

# Inject custom CSS to expand all sidebar sections by default
extra_css:
  - assets/expand-sidebar.css

markdown_extensions:
  - admonition              # Note/warning/tip blocks
  - attr_list               # {: .class} syntax
  - def_list                # Definition lists
  - footnotes               # Footnotes
  - md_in_html              # Markdown inside HTML
  - meta                    # Metadata support
  - tables                  # GFM tables (we use these everywhere)
  - toc:
      permalink: true       # Anchor links on headings
      toc_depth: 3
  - pymdownx.details        # Collapsible admonitions
  - pymdownx.superfences    # Better code fences
  - pymdownx.tabbed:        # Tabbed content
      alternate_style: true
  - pymdownx.emoji:         # Emoji shortcodes
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.inlinehilite   # Inline code highlighting
  - pymdownx.tasklist:      # Checkbox task lists
      custom_checkbox: true

plugins:
  - search:
      lang: en

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HenryPhamDuc
  generator: false

# Nav: explicit structure so the menu order is deterministic and the
# Complete Manual v2 is the homepage. Each top-level entry is a deep-dive
# folder; each sub-entry is the MD file inside that folder, with the
# ReadMe at the end of each section so it doesn't bury the main content.
