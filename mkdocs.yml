site_name: 🎾 Henry's Tennis Knowledge Vault
site_description: A bilingual (EN-VI) tennis coaching library for the 3.5 player at 50+ — 22 deep dives, a 14-Part master manual, a 2-page cheat sheet, and 20 years of accumulated biomechanics, taichi principles, and 50+ longevity adjustments.
site_author: Henry Pham Duc
site_url: https://henryphamduc.github.io/tennis/
repo_url: https://github.com/HenryPhamDuc/tennis
repo_name: HenryPhamDuc/tennis
edit_uri: edit/master/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.tabs           # Top horizontal menu (Home + Contact only)
    - navigation.sections       # Sidebar collapse for sub-chapters
    - navigation.indexes        # Section index pages
    # NOTE: navigation.expand is a no-op in Material 9.x; sidebar expansion
    # is handled by docs/assets/expand-sidebar.css (linked via extra_css below).
    - navigation.top            # Back to top button
    - navigation.tracking       # URL tracking for anchor links
    - search.suggest            # Smart search bar auto-suggestions
    - search.highlight          # Highlight matches in results
    - search.share              # Share search results via URL
    - content.code.copy         # Copy button on code blocks
    - content.tabs.link         # Sync tabs across instances
    - toc.follow                # Follow scroll position
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
    logo: material/tennis

# Inject custom CSS for the entire library
extra_css:
  - assets/expand-sidebar.css
  - assets/sidebar-nav.css
  - assets/floating-nav.css

# Inject custom JavaScript:
#   - open-external-links.js: adds target="_blank" to external links
#     (Tennis Future Lab Website + Audio Podcast open in a new tab)
#   - sidebar-nav.js: injects Home/Previous/Next navigation bars at
#     the top of the sidebar AND at the bottom of each page
#   - floating-nav.js: injects a floating Home/Previous/Next button
#     bar in the bottom-right corner that appears when the user
#     scrolls down (and disappears at the very bottom where the
#     sidebar-nav.js bottom bar already provides nav). Solves the
#     "I've read to the end, now I have to scroll all the way up"
#     problem.
extra_javascript:
  - assets/open-external-links.js
  - assets/sidebar-nav.js
  - assets/floating-nav.js

markdown_extensions:
  - admonition              # Note/warning/tip blocks
  - attr_list               # {: .class} syntax
  - def_list                # Definition lists
  - footnotes               # Footnotes
  - md_in_html              # Markdown inside HTML
  - meta                    # Metadata support
  - tables                  # GFM tables (we use these everywhere)
  - toc:
      permalink: true       # Anchor links on headings
      toc_depth: 3
  - pymdownx.details        # Collapsible admonitions
  - pymdownx.superfences    # Better code fences
  - pymdownx.tabbed:        # Tabbed content
      alternate_style: true
  - pymdownx.emoji:         # Emoji shortcodes
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.inlinehilite   # Inline code highlighting
  - pymdownx.tasklist:      # Checkbox task lists
      custom_checkbox: true

plugins:
  - search:
      lang: en

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HenryPhamDuc
  generator: false

# ---------------------------------------------------------------------------
# Navigation structure (v4 — June 2026)
#
# Strategy: explicit nav listing ALL 20 deep-dive folders so they appear in
# the sidebar. Top-level nav entries become top tabs. We use CSS to HIDE
# all top tabs except the first 4 (Home, Tennis Future Lab Website, Tennis
# Future Lab Audio Podcast, Contact) — so users only see a clean top bar.
#
# Top tabs visible (in order):
#   1. Home                   — Complete Manual v2
#   2. Tennis Future Lab Website — external: https://tennislab-cdl84oed.manus.space/
#   3. Tennis Future Lab Audio Podcast — external: https://rss.com/podcasts/the-power-of-now/
#   4. Contact                — mailto:henry.phamduc@gmail.com
#
# Top tabs HIDDEN via CSS (md-tabs__item:nth-child(n+5)):
#   5-24. All 20 deep-dive folders (Forehand, Backhand, Serve, etc.)
#
# Sidebar: ALL pages auto-populated from nav + filesystem. The
# docs/assets/expand-sidebar.css file forces all sidebar sections
# expanded by default so the 20 folders and ~47 sub-pages are all
# visible without clicking.
#
# Why this approach?
# - Top bar stays clean (4 entries)
# - Sidebar shows the full library at a glance
# - Adding a new deep-dive = drop .md in docs/Foo/, add 3 lines to nav
# ---------------------------------------------------------------------------
